<!DOCTYPE html>
<html>
<head>
    <title>Zone Editor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
</head>
<body>

<div class="container">
    <h1>Zone Editor</h1>
    <a href="{{ url_for('index') }}">← Back</a>

    <!-- SHADING CANVAS (BELOW POINTS, ABOVE MAP) -->
    <div style="position: relative; width: 1024px; height: 1024px;">
        <canvas id="zoneShadingCanvas" width="1024" height="1024"
                style="position:absolute; top:0; left:0; pointer-events:none; z-index:5;"></canvas>

        <!-- MAIN DRAWING CANVAS -->
        <canvas id="zoneCanvas" width="1024" height="1024"
                style="position:absolute; top:0; left:0; z-index:10;"></canvas>
    </div>

    <form method="post" action="{{ url_for('zones_dashboard') }}">
        <p>
            <label>Zone Name:</label>
            <input type="text" name="zone_name" required>
        </p>

        <p>
            <label>Action:</label>
            <select name="zone_action">
                <option value="log">Log only</option>
                <option value="warn">Warn</option>
                <option value="kick">Kick</option>
                <option value="ban">Ban</option>
                <option value="tp">Teleport</option>
            </select>
        </p>

        <input type="hidden" id="pointsField" name="points_json">
        <button type="submit">Save Zone</button>
    </form>

    <h2>Existing Zones</h2>

    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Action</th>
            <th>Points</th>
            <th>Delete</th>
        </tr>

        {% for z in zones %}
        <tr>
            <td>{{ z.id }}</td>
            <td>{{ z.name }}</td>
            <td>{{ z.action }}</td>
            <td>{{ z.points }}</td>
            <td>
                <form method="post" action="{{ url_for('delete_zone_route', zone_id=z.id) }}">
                    <button type="submit">Delete</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>
</div>

<script>
    const canvas = new fabric.Canvas('zoneCanvas', { selection: false });
    const shadingCanvas = document.getElementById("zoneShadingCanvas");
    const shadingCtx = shadingCanvas.getContext("2d");

    let points = [];
    let scale = 1; // pixel → world scale (set after map loads)

    // Load map
    fabric.Image.fromURL('/static/chernarus.jpg', function(img) {
        img.set({ selectable: false });

        scale = canvas.width / img.width;

        canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), {
            scaleX: scale,
            scaleY: scale
        });

        // Draw existing zones after map loads
        drawExistingZones();
    });

    // Draw points when clicking
    canvas.on('mouse:down', function(opt) {
        const pointer = canvas.getPointer(opt.e);

        const circle = new fabric.Circle({
            left: pointer.x,
            top: pointer.y,
            radius: 3,
            fill: 'red',
            selectable: false,
            originX: 'center',
            originY: 'center'
        });

        canvas.add(circle);

        points.push({ x: pointer.x, y: pointer.y });
        document.getElementById('pointsField').value = JSON.stringify(points);
    });

    // --------------------------
    // ZONE SHADING FUNCTIONS
    // --------------------------

    function getZoneColor(i) {
        const colors = [
            "rgba(255, 0, 0, 0.25)",
            "rgba(0, 255, 0, 0.25)",
            "rgba(0, 0, 255, 0.25)",
            "rgba(255, 255, 0, 0.25)",
            "rgba(255, 0, 255, 0.25)",
            "rgba(0, 255, 255, 0.25)"
        ];
        return colors[i % colors.length];
    }

    function drawShadedZones(zones) {
        shadingCtx.clearRect(0, 0, shadingCanvas.width, shadingCanvas.height);

        zones.forEach((zone, index) => {
            const color = getZoneColor(index);

            shadingCtx.fillStyle = color;
            shadingCtx.beginPath();

            zone.points.forEach((p, i) => {
                const px = p.x * scale;
                const py = p.y * scale;

                if (i === 0) shadingCtx.moveTo(px, py);
                else shadingCtx.lineTo(px, py);
            });

            shadingCtx.closePath();
            shadingCtx.fill();
        });
    }

    // Load existing zones from backend
    function drawExistingZones() {
        fetch("/api/zones")
            .then(res => res.json())
            .then(data => {
                drawShadedZones(data);
            });
    }
</script>

</body>
</html>
