<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}MMC Guard{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- TailwindCSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        mmc: {
                            bg: '#050816',
                            card: '#0f172a',
                            accent: '#38bdf8',
                            accent2: '#22c55e'
                        }
                    }
                }
            }
        }
    </script>

    {% block head_extra %}{% endblock %}
</head>

<body class="bg-mmc-bg text-gray-200 min-h-screen">
<div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-64 bg-gray-900 border-r border-gray-800 flex flex-col">
        <div class="px-6 py-5 border-b border-gray-800">
            <h1 class="text-2xl font-bold text-white">MMC Guard</h1>
            <p class="text-xs text-gray-400">DayZ Admin Dashboard</p>
        </div>

        <nav class="flex-1 px-4 py-4 space-y-1">
            <a href="/" class="block px-3 py-2 rounded-lg hover:bg-gray-800">🏠 Overview</a>
            <a href="/dashboard/zones" class="block px-3 py-2 rounded-lg hover:bg-gray-800">🗺️ Zones</a>
            <a href="/dashboard/discord-settings" class="block px-3 py-2 rounded-lg hover:bg-gray-800">💬 Discord Settings</a>
        </nav>

        <div class="px-4 py-4 border-t border-gray-800 text-xs text-gray-500">
            MMC Guard © 2026
        </div>
    </aside>

    <!-- Main content -->
    <main class="flex-1 flex flex-col">
        <header class="h-16 border-b border-gray-800 flex items-center px-6 bg-gray-950/70 backdrop-blur">
            <h2 class="text-lg font-semibold text-white">
                {% block page_title %}{% endblock %}
            </h2>
        </header>

        <section class="flex-1 overflow-y-auto p-6">
            {% block content %}{% endblock %}
        </section>
    </main>

</div>

{% block body_extra %}{% endblock %}
</body>
</html>
